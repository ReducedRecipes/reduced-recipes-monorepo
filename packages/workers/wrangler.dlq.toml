name = "rr-dlq"
main = "src/dlq.ts"
compatibility_date = "2024-05-01"

[[queues.consumers]]
queue = "crawl-dlq"
max_batch_size = 10
max_retries = 0

[[queues.consumers]]
queue = "parse-dlq"
max_batch_size = 10
max_retries = 0

[[queues.consumers]]
queue = "projection-dlq"
max_batch_size = 10
max_retries = 0

[[d1_databases]]
binding = "DB"
database_id = "REPLACE_WITH_D1_ID"
database_name = "reduced-recipes-prod"

[env.preview]
name = "rr-dlq-preview"
