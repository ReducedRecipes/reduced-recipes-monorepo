name = "rr-api"
main = "src/api.ts"
compatibility_date = "2024-05-01"

workers_dev = true

routes = [
  { pattern = "reducedrecipes.com/api/*", zone_name = "reducedrecipes.com" },
]

[[d1_databases]]
binding = "DB"
database_id = "e0ecb67a-9cb4-41fa-979b-10599a02c6cb"
database_name = "reduced-recipes-prod"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "RECIPES_KV"
id = "1ca521a6b82b499b802318ee8bf747db"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "18ffdf8619c84b22b4993371e4eb92c7"

[[r2_buckets]]
binding = "IMAGES_R2"
bucket_name = "rr-images"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-jobs"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "parse-jobs"

[[queues.producers]]
binding = "PROJECTION_QUEUE"
queue = "projection-jobs"

[[d1_databases]]
binding = "USERS_DB"
database_id = "3bb2302a-7f7a-43c9-b3e7-de5870824869"
database_name = "reduced-recipes-users"
migrations_dir = "../../migrations-users"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "b780ce4935dd4cd6834defdb30c2137f"

[[kv_namespaces]]
binding = "USER_CACHE_KV"
id = "41828007810046b2bc6feab80aece86a"

[ai]
binding = "AI"

[vars]
BOT_USER_AGENT = "ReducedRecipesBot/1.0"
DEFAULT_CRAWL_DELAY_MS = "2000"
MAX_QUEUE_BATCH = "10"
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put <NAME>`):
#   ADMIN_TOKEN
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   GOOGLE_REDIRECT_URI
#   SESSION_SECRET

[env.preview]
name = "rr-api-preview"
