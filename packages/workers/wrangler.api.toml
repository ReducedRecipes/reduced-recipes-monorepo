name = "rr-api"
main = "src/api.ts"
compatibility_date = "2024-05-01"

workers_dev = true

routes = [
  { pattern = "reducedrecipes.com/api/*", zone_name = "reducedrecipes.com" },
  { pattern = "reducedrecipes.com/sitemap*", zone_name = "reducedrecipes.com" },
  { pattern = "reducedrecipes.com/robots.txt", zone_name = "reducedrecipes.com" },
  { pattern = "reduced.recipes/sitemap*", zone_name = "reduced.recipes" },
  { pattern = "reduced.recipes/robots.txt", zone_name = "reduced.recipes" },
]

[[d1_databases]]
binding = "DB"
database_id = "e0ecb67a-9cb4-41fa-979b-10599a02c6cb"
database_name = "reduced-recipes-prod"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "RECIPES_KV"
id = "1ca521a6b82b499b802318ee8bf747db"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "18ffdf8619c84b22b4993371e4eb92c7"

[[r2_buckets]]
binding = "IMAGES_R2"
bucket_name = "rr-images"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-jobs"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "parse-jobs"

[[queues.producers]]
binding = "PROJECTION_QUEUE"
queue = "projection-jobs"

[[queues.producers]]
binding = "INGREDIENT_PARSE_QUEUE"
queue = "ingredient-parse-jobs"

[[queues.consumers]]
queue = "ingredient-parse-jobs"
max_batch_size = 10
max_batch_timeout = 5

[[d1_databases]]
binding = "USERS_DB"
database_id = "3bb2302a-7f7a-43c9-b3e7-de5870824869"
database_name = "reduced-recipes-users"
migrations_dir = "../../migrations-users"

[[d1_databases]]
binding = "CRAWL_DB"
database_id = "372e4627-76ea-4692-84f3-8dbf33e59e05"
database_name = "reduced-recipes-crawl"
migrations_dir = "../../migrations-crawl"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "b780ce4935dd4cd6834defdb30c2137f"

[[kv_namespaces]]
binding = "USER_CACHE_KV"
id = "41828007810046b2bc6feab80aece86a"

[[d1_databases]]
binding = "FUNDING_DB"
database_id = "dc6d2bd6-e3cd-490a-ad86-45ffe7f819b4"
database_name = "reduced-recipes-funding"
migrations_dir = "../../migrations-funding"

[[kv_namespaces]]
binding = "VOTES_KV"
id = "d155678de4864fda86916dbd2b03a29d"

[durable_objects]
bindings = [
  { name = "SHOPPING_LIST_DO", class_name = "ShoppingListDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["ShoppingListDO"]

[[vectorize]]
binding = "VECTORIZE"
index_name = "rr-recipes"

[ai]
binding = "AI"

[vars]
BOT_USER_AGENT = "ReducedRecipesBot/1.0"
DEFAULT_CRAWL_DELAY_MS = "2000"
MAX_QUEUE_BATCH = "10"
ENVIRONMENT = "production"

# Hot ranking
HOT_DECAY_SECONDS = "90000"
HOT_MIN_VOTES_FEATURED = "1"
HOT_MIN_TOTAL_VOTES = "3"
HOT_RATE_LIMIT_PER_DAY = "100"
HOT_EPOCH = "1704067200"

# Engagement weights
WEIGHT_HEART = "1.0"
WEIGHT_LIST_ADD = "1.5"
WEIGHT_AUTH_VIEW = "0.1"

# Secrets (set via `wrangler secret put <NAME>`):
#   ADMIN_TOKEN
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   GOOGLE_REDIRECT_URI
#   SESSION_SECRET

[env.preview]
name = "rr-api-preview"
