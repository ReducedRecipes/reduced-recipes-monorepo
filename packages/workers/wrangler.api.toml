name = "rr-api"
main = "src/api.ts"
compatibility_date = "2024-05-01"

workers_dev = true

routes = [
  { pattern = "reducedrecipes.com/api/*", zone_name = "reducedrecipes.com" },
]

[[d1_databases]]
binding = "DB"
database_id = "e0ecb67a-9cb4-41fa-979b-10599a02c6cb"
database_name = "reduced-recipes-prod"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "RECIPES_KV"
id = "1ca521a6b82b499b802318ee8bf747db"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "18ffdf8619c84b22b4993371e4eb92c7"

[[r2_buckets]]
binding = "IMAGES_R2"
bucket_name = "rr-images"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-jobs"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "parse-jobs"

[[queues.producers]]
binding = "PROJECTION_QUEUE"
queue = "projection-jobs"

[vars]
BOT_USER_AGENT = "ReducedRecipesBot/1.0"
DEFAULT_CRAWL_DELAY_MS = "2000"
MAX_QUEUE_BATCH = "10"
ENVIRONMENT = "production"

# ADMIN_TOKEN should be set as a secret via `wrangler secret put ADMIN_TOKEN`

[env.preview]
name = "rr-api-preview"
