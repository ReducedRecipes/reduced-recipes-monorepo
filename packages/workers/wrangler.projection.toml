name = "rr-projection"
main = "src/projection.ts"
compatibility_date = "2024-05-01"

[[queues.consumers]]
queue = "projection-jobs"
max_batch_size = 25
max_retries = 5
dead_letter_queue = "projection-dlq"

[[d1_databases]]
binding = "DB"
database_id = "e0ecb67a-9cb4-41fa-979b-10599a02c6cb"
database_name = "reduced-recipes-prod"

[[d1_databases]]
binding = "CRAWL_DB"
database_id = "372e4627-76ea-4692-84f3-8dbf33e59e05"
database_name = "reduced-recipes-crawl"

[[kv_namespaces]]
binding = "RECIPES_KV"
id = "1ca521a6b82b499b802318ee8bf747db"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "18ffdf8619c84b22b4993371e4eb92c7"

[[r2_buckets]]
binding = "IMAGES_R2"
bucket_name = "rr-images"

[[queues.producers]]
binding = "CRAWL_QUEUE"
queue = "crawl-jobs"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "parse-jobs"

[[queues.producers]]
binding = "PROJECTION_QUEUE"
queue = "projection-jobs"

[[vectorize]]
binding = "VECTORIZE"
index_name = "rr-recipes"

[ai]
binding = "AI"

[vars]
BOT_USER_AGENT = "ReducedRecipesBot/1.0"
DEFAULT_CRAWL_DELAY_MS = "2000"
MAX_QUEUE_BATCH = "10"
ENVIRONMENT = "production"

[env.preview]
name = "rr-projection-preview"
