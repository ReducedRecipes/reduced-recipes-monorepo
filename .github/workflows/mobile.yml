name: Mobile Build & Submit

on:
  push:
    tags: ['v*']
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:

env:
  EAS_BUILD_NO_EXPO_GO_WARNING: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Typecheck mobile
        run: pnpm --filter @rr/mobile typecheck

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > packages/mobile/google-play-service-account.json

      - name: Write Apple App Store Connect API key
        env:
          APPLE_ASC_API_KEY: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY }}
        run: printf '%s' "$APPLE_ASC_API_KEY" > packages/mobile/apple-asc-api-key.p8

      - name: Inject iOS submit credentials into eas.json
        working-directory: packages/mobile
        env:
          ASC_APP_ID: ${{ secrets.APPLE_ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          jq \
            --arg appId "$ASC_APP_ID" \
            --arg teamId "$APPLE_TEAM_ID" \
            --arg keyId "$ASC_API_KEY_ID" \
            --arg issuerId "$ASC_API_ISSUER_ID" \
            '.submit.production.ios.ascAppId = $appId
             | .submit.production.ios.appleTeamId = $teamId
             | .submit.production.ios.ascApiKeyId = $keyId
             | .submit.production.ios.ascApiKeyIssuerId = $issuerId' \
            eas.json > eas.json.tmp && mv eas.json.tmp eas.json

      - name: Build and submit (iOS + Android)
        working-directory: packages/mobile
        run: eas build --platform all --profile production --non-interactive --auto-submit
