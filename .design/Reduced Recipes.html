<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root{
  --bg: oklch(0.97 0.008 85);
  --bg-2: oklch(0.94 0.012 85);
  --ink: oklch(0.18 0.012 60);
  --ink-2: oklch(0.38 0.012 60);
  --ink-3: oklch(0.60 0.010 60);
  --rule: oklch(0.85 0.010 70);
  --rule-2: oklch(0.78 0.012 70);
  --accent: oklch(0.62 0.18 30);
  --accent-ink: oklch(0.32 0.12 30);
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter", -apple-system, system-ui, sans-serif;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
*{box-sizing:border-box}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
a{color:inherit;text-decoration:none}
input,select,textarea{font:inherit;color:inherit}

/* Density variants applied via data-density on html */
html[data-density="tight"] { font-size: 14px; }
html[data-density="airy"]  { font-size: 16px; }

.mono{font-family:var(--mono);font-feature-settings:"ss01","zero"}
.serif{font-family:var(--serif)}
.caps{font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; font-size:11px; font-weight:500}

/* selection */
::selection{background:var(--accent);color:var(--bg)}

/* ——— Noise texture (super subtle) ——— */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:100;opacity:.35;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08 0 0 0 0 0.07 0 0 0 0 0.06 0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
</style>
</head>
<body>
<div id="root"></div>

<script>
/*EDITMODE-BEGIN*/

  "tone": "deadpan"
};
/*EDITMODE-END*/
</script>

<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
